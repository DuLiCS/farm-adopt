server {
  listen 80;
  server_name shannanji.com www.shannanji.com _;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # 管理后台assets
  location ^~ /admin-panel/assets/ {
    alias /usr/share/nginx/html/admin/assets/;
    expires 1y;
  }

  location ^~ /admin-panel/vite.svg {
    alias /usr/share/nginx/html/admin/vite.svg;
  }

  # 管理后台
  location ^~ /admin-panel {
    alias /usr/share/nginx/html/admin;
    try_files $uri $uri/ @admin_fallback;
    index index.html;
  }

  location @admin_fallback {
    rewrite ^ /admin-panel/index.html last;
  }

  location = /admin-panel/index.html {
    alias /usr/share/nginx/html/admin/index.html;
  }

  # 后端所有路由（允许带或不带尾部斜杠）
  location ~ ^/(api|auth|orders|admin|plaza)(/|$) {
    proxy_pass http://app:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # 用户端
  location / {
    root /usr/share/nginx/html/app;
    try_files $uri $uri/ /index.html;
    index index.html;
  }
}
