server {
  listen 80;
  server_name shannanji.com www.shannanji.com;
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }
  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  client_max_body_size 10m;
  listen 443 ssl;
  server_name shannanji.com www.shannanji.com;

  ssl_certificate /etc/letsencrypt/live/shannanji.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/shannanji.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }
  location ^~ /admin-panel/assets/ {
    alias /usr/share/nginx/html/admin/assets/;
    expires 1y;
  }
  location ^~ /admin-panel/vite.svg {
    alias /usr/share/nginx/html/admin/vite.svg;
  }
  location ^~ /admin-panel {
    alias /usr/share/nginx/html/admin;
    try_files $uri $uri/ @admin_fallback;
    index index.html;
  }
  location @admin_fallback {
    rewrite ^ /admin-panel/index.html last;
  }
  location = /admin-panel/index.html {
    alias /usr/share/nginx/html/admin/index.html;
  }
  location ^~ /static/ {
    alias /opt/farm-adopt/static/;
    expires 30d;
    add_header Cache-Control "public";
  }
  location ~ ^/(api|auth|orders|admin|plaza)(/|$) {
    proxy_pass http://app:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
  location / {
    root /usr/share/nginx/html/app;
    try_files $uri $uri/ /index.html;
    index index.html;
  }
}
